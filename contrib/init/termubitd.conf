description "Termubit Core Daemon"

start on runlevel [2345]
stop on starting rc RUNLEVEL=[016]

env TERMUBITD_BIN="/usr/bin/termubitd"
env TERMUBITD_USER="termubit"
env TERMUBITD_GROUP="termubit"
env TERMUBITD_PIDDIR="/var/run/termubitd"
# upstart can't handle variables constructed with other variables
env TERMUBITD_PIDFILE="/var/run/termubitd/termubitd.pid"
env TERMUBITD_CONFIGFILE="/etc/termubit/termubit.conf"
env TERMUBITD_DATADIR="/var/lib/termubitd"

expect fork

respawn
respawn limit 5 120
kill timeout 60

pre-start script
    # this will catch non-existent config files
    # termubitd will check and exit with this very warning, but it can do so
    # long after forking, leaving upstart to think everything started fine.
    # since this is a commonly encountered case on install, just check and
    # warn here.
    if ! grep -qs '^rpcpassword=' "$TERMUBITD_CONFIGFILE" ; then
        echo "ERROR: You must set a secure rpcpassword to run termubitd."
        echo "The setting must appear in $TERMUBITD_CONFIGFILE"
        echo
        echo "This password is security critical to securing wallets "
        echo "and must not be the same as the rpcuser setting."
        echo "You can generate a suitable random password using the following"
        echo "command from the shell:"
        echo
        echo "bash -c 'tr -dc a-zA-Z0-9 < /dev/urandom | head -c32 && echo'"
        echo
        echo "It is also recommended that you also set alertnotify so you are "
        echo "notified of problems:"
        echo
        echo "ie: alertnotify=echo %%s | mail -s \"Termubit Alert\"" \
            "admin@foo.com"
        echo
        exit 1
    fi

    mkdir -p "$TERMUBITD_PIDDIR"
    chmod 0755 "$TERMUBITD_PIDDIR"
    chown $TERMUBITD_USER:$TERMUBITD_GROUP "$TERMUBITD_PIDDIR"
    chown $TERMUBITD_USER:$TERMUBITD_GROUP "$TERMUBITD_CONFIGFILE"
    chmod 0660 "$TERMUBITD_CONFIGFILE"
end script

exec start-stop-daemon \
    --start \
    --pidfile "$TERMUBITD_PIDFILE" \
    --chuid $TERMUBITD_USER:$TERMUBITD_GROUP \
    --exec "$TERMUBITD_BIN" \
    -- \
    -pid="$TERMUBITD_PIDFILE" \
    -conf="$TERMUBITD_CONFIGFILE" \
    -datadir="$TERMUBITD_DATADIR" \
    -disablewallet \
    -daemon

