name: Full Build Matrix

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        target:
          - { name: "aarch64-linux", host: "aarch64-linux-gnu", flags: "" }
          - { name: "x86_64-linux-nowallet", host: "x86_64-pc-linux-gnu", flags: "--disable-wallet" }
          - { name: "i686-win", host: "i686-w64-mingw32", flags: "--enable-experimental" }

    steps:
      - uses: actions/checkout@v3

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libtool autotools-dev automake pkg-config \
          g++-aarch64-linux-gnu g++-mingw-w64-i686 gcc-mingw-w64-i686

      - name: Build Dependencies (Local)
        run: |
          cd depends
          make HOST=${{ matrix.target.host }} -j$(nproc)

      - name: Configure and Build
        run: |
          ./autogen.sh
          ./configure --prefix=$(pwd)/depends/${{ matrix.target.host }} \
          --with-incompatible-bdb ${{ matrix.target.flags }} \
          CXXFLAGS="-std=c++14"
          make -j$(nproc)

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: termucoin-${{ matrix.target.name }}
          path: src/termucoind*
